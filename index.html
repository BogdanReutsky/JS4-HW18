<!DOCTYPE html><html lang=en><meta charset=UTF-8><meta name=viewport content="width=device-width, initial-scale=1.0"><title>CRUD Students</title><link rel=stylesheet href=/JS4-HW18/JS4-HW18.b517ecce.css><link rel=stylesheet href=https://cdnjs.cloudflare.com/ajax/libs/modern-normalize/3.0.1/modern-normalize.min.css><body>
  <div class=container>
    <h1>Список студентів</h1>
    <button id=get-students-btn>Отримати студентів</button>
    <table id=students-table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Ім'я</th>
          <th>Вік</th>
          <th>Курс</th>
          <th>Навички</th>
          <th>Email</th>
          <th>Статус</th>
          <th>Дії</th>
        </tr>
      </thead>
      <tbody class=tbody>
      </tbody>
    </table>

    <h2>Додати нового студента</h2>
    <form id=add-student-form>
      <label>Ім'я: <input id=name required></label>
      <label>Вік: <input type=number id=age required></label>
      <label>Курс: <input id=course required></label>
      <label>Навички (через кому): <input id=skills required></label>
      <label>Email: <input type=email id=email required></label>
      <label>Записаний: <input type=checkbox id=isEnrolled></label>
      <button>Додати студента</button>
    </form>
  </div>

  <script type=module src=/JS4-HW18/JS4-HW18.78fff278.js></script>
